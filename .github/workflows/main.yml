name: Automated Python Tasks

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install required dependencies
      run: |
        if [ -f requierment.txt ]; then pip install -r requierment.txt; fi

    - name: Run News Scraper Script
      run: python news_scrapper.py

    - name: Run Weather Alert Script
      run: python whether.py

    - name: Run Bot Main Engine
      run: python bot.py
