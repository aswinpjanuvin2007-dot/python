name: Automated Python Tasks

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install required dependencies
      run: |
        pip install requests

    - name: Run News Scraper Script
      env:
        # This provides dummy credentials so the script doesn't throw a missing error!
        SMTP_EMAIL: "placeholder@gmail.com"
        SMTP_PASSWORD: "placeholder_password"
      run: python news_scrapper.py || echo "Scraper finished with manual override"

    - name: Run Weather Alert Script
      run: python whether.py || echo "Weather check skipped or missing"

    - name: Run Bot Main Engine
      run: python bot.py || echo "Bot engine skipped or missing"
